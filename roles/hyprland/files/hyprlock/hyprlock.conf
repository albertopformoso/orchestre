$WALLPAPER_PATH = ~/.config/hypr/hyprlock/wallpaper

# BACKGROUND
background {
    path = $WALLPAPER_PATH
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# INPUT FIELD
input-field {
    size = 170, 45
    outline_thickness = 2
    dots_size = 0.2     # Scale of input field height, 0.2 - 0.8
    dots_spacing = 0.2  # Scale of dots, absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Google Sans Flex Light Rounded
    placeholder_text = <span foreground="##ffffff99">Enter Password</span>
    hide_input = false
    position = 0, -425
    halign = center
    valign = center
}

# TIME - Hour
label {
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 90
    font_family = Google Sans Flex Medium Rounded
    position = 0, 120
    halign = center
    valign = center
}

# TIME - Minute
label {
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 90
    font_family = Google Sans Flex Medium Rounded
    position = 0, 10
    halign = center
    valign = center
}

# DAY-MONTH-YEAR
label {
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = Google Sans Flex Medium Rounded
    position = 25, -20
    halign = left
    valign = top
}

# Profile-Photo
image {
    monitor =
    path = /home/user0/.config/hypr/hyprlock/user-img.jpg
    border_color = 0xffdddddd
    border_size = 0
    size = 110
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -265
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 18
    font_family = Google Sans Flex Medium Rounded
    position = 0, -370
    halign = center
    valign = center
}

# SLEEP BUTTON
label {
    text = 󰤄
    color = rgba(216, 222, 233, 0.55)
    font_size = 14
    font_family = Symbols Nerd Font Mono
    onclick = systemctl suspend
    position = -120, -20
    halign = right
    valign = top
}

# POWER BUTTON - RESTART
label {
    text = 󰜉
    color = rgba(216, 222, 233, 0.55)
    font_size = 14
    font_family = Symbols Nerd Font Mono
    onclick = systemctl reboot
    position = -70, -20
    halign = right
    valign = top
}

# POWER BUTTON - POWER OFF
label {
    text = 
    color = rgba(216, 222, 233, 0.55)
    font_size = 14
    font_family = Symbols Nerd Font Mono
    onclick = systemctl poweroff
    position = -25, -20
    halign = right
    valign = top
}

# BATTERY
label {
    monitor =
    text = cmd[update:5000] echo -e "$(~/.config/hypr/hyprlock/scripts/battery.sh)"
    color = rgba(216, 222, 233, 0.55)
    font_size = 14
    font_family = Symbols Nerd Font Mono
    position = -25, 20
    halign = right
    valign = bottom
}
